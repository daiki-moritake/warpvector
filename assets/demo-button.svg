<svg xmlns="http://www.w3.org/2000/svg" width="360" height="68" viewBox="0 0 360 68">
  <defs>
    <linearGradient id="neonBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f1123" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>

    <pattern id="warpGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#8B5CF6" stroke-width="0.5" stroke-opacity="0.3" />
    </pattern>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="btnShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#8B5CF6" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <rect x="2" y="2" width="356" height="64" rx="32" fill="#000" filter="url(#btnShadow)" />
  
  <rect x="2" y="2" width="356" height="64" rx="32" fill="url(#bgGrad)" />
  
  <clipPath id="btnClip">
    <rect x="2" y="2" width="356" height="64" rx="32" />
  </clipPath>
  <rect x="2" y="2" width="356" height="64" fill="url(#warpGrid)" clip-path="url(#btnClip)" />

  <g clip-path="url(#btnClip)">
    <line x1="-10" y1="15" x2="150" y2="15" stroke="#EC4899" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7" stroke-dasharray="10 20 5 10 30" />
    <line x1="220" y1="52" x2="380" y2="52" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7" stroke-dasharray="20 10 5 20 15" />
    <line x1="120" y1="8" x2="250" y2="8" stroke="#8B5CF6" stroke-width="1" stroke-linecap="round" stroke-opacity="0.5" stroke-dasharray="5 15 25 5" />
  </g>

  <rect x="3" y="3" width="354" height="62" rx="31" fill="none" stroke="url(#neonBorder)" stroke-width="2" />
  
  <g transform="translate(34, 20)">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#neonBorder)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
      <polygon points="5 3 19 12 5 21 5 3" fill="#8B5CF6" fill-opacity="0.25"></polygon>
      <path d="M 19 2 L 20 5 L 23 6 L 20 7 L 19 10 L 18 7 L 15 6 L 18 5 Z" fill="#EC4899" stroke="none" />
    </svg>
  </g>
  
  <text x="76" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff" letter-spacing="0.5" filter="url(#glow)">Try Interactive Playground</text>
</svg>
