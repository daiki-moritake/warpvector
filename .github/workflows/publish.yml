name: Publish to npm

on:
  release:
    types: [published]
  # GitHub の画面から手動で実行できるようにする
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    # npm Trusted Publishing (OIDC) のための権限設定
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # warpvector は Bun と Node.js(npm) の両方を使用するため両方をセットアップします
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

      - name: Build the project
        run: bun run build

      - name: Publish to npm
        # Trusted Publishing (OIDC) により NPM_TOKEN 不要
        # --provenance で「このパッケージはこのリポジトリからビルドされた」証明を付与
        run: npm publish --provenance --access public
